# Uso: docker compose -f docker-compose.dev.yml up -d
# Sobe só o banco. Backend e frontend rodam local com hot reload.

services:
  db:
    image: postgres:16-alpine
    container_name: helpdesk-db-dev
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
